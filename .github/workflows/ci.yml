name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gbr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      # We'll create a dedicated app user in the job setup step and configure DATABASE_URL accordingly
      DB_NAME: gbr
      DB_OWNER: app_client
      DB_OWNER_PW: test_password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres..."
          for i in {1..20}; do pg_isready -h localhost -p 5432 -U postgres && break || sleep 1; done

      - name: Create app DB user and grant privileges
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d gbr -c "CREATE USER $DB_OWNER WITH PASSWORD '$DB_OWNER_PW';" || true
          PGPASSWORD=postgres psql -h localhost -U postgres -d gbr -c "GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_OWNER;" || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://app_client:test_password@localhost:5432/gbr
        run: |
          pytest -q
