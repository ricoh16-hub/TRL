name: CI - SQLite opt-in test

on:
  pull_request:
  workflow_dispatch:

jobs:
  sqlite-opt-in:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run SQLite opt-in test (fast)
        env:
          ALLOW_SQLITE_DEV: '1'
        run: |
          pytest -q tests/test_engine_creation.py
