name: Python CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: >-
          python -m ruff check
          src/auth
          src/database
          src/main.py
          src/ui/mainform.py
          src/ui/userform.py
          src/ui/webform.py
          src/ui/battery_status.py
          src/ui/boot.py
          src/ui/login.py
          src/ui/lock.py
          scripts
          tests

      - name: Run Pytest
        run: python -m pytest

      - name: Upload Coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error