name: Python CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: |
          # Run ruff against directories to avoid failures from missing individual files
          python -m ruff check src scripts tests

      - name: Run Pytest (with coverage)
        run: |
          # Tell coverage where the project source is so it doesn't search unrelated paths
          # and override any configured fail-under so CI doesn't fail on low coverage.
          # Run pytest under coverage but disable the pytest-cov plugin so any
          # configured `fail_under` in pyproject.toml doesn't cause CI to fail.
          python -m coverage run --source src -m pytest -p no:pytest_cov
          python -m coverage xml -o coverage.xml

      - name: Upload Coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore