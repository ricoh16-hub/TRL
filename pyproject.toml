[tool.pytest.ini_options]
addopts = "-q -ra --cov=src.auth --cov=src.database.models --cov-report=term-missing --cov-report=xml"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
parallel = false

[tool.coverage.report]
skip_covered = false
show_missing = true
fail_under = 90

[tool.ruff]
target-version = "py312"
line-length = 100
force-exclude = true
extend-exclude = [
  ".venv",
  "backup",
  "final",
  "assets",
  "alembic/versions",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
"scripts/migrate_user_password_schema.py" = ["E402"]